<body>
    <!-- 导航栏 (由 shared.js 注入) -->
    <div id="navbar-placeholder"></div>

    <div class="colors-page">
        <div class="colors-container">
            <div class="colors-layout">
                <aside class="colors-sidebar">
                    <div class="sidebar-header">
                        <h2>Palette Selection</h2>
                    </div>
                    <div id="seriesNavList"></div>
                </aside>

                <main class="colors-main">
                    <div class="colors-content">
                        <div class="search-container">
                            <div class="search-box">
                                <span class="search-icon">🔍</span>
                                <input type="text" id="colorSearch" placeholder="Search color name or HEX..." />
                                <button class="search-clear" id="searchClear" style="display: none;">✕</button>
                            </div>
                        </div>

                        <div id="paletteIntro">
                            <h3>Select a palette to view colors</h3>
                            <p>Click on a color card to copy its HEX value</p>
                        </div>

                        <div id="color-series"></div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="colors.js"></script>
    <script>
        (function() {
            let currentPalette = 'mard291';

            function init() {
                renderSidebarPalettes();
                renderColors();
                setupEventListeners();
            }

            function renderSidebarPalettes() {
                const container = document.getElementById('seriesNavList');
                if (!container || !palettes) return;
                
                container.innerHTML = Object.entries(palettes).map(([key, palette]) => `
                    <button class="palette-item${key === currentPalette ? ' active' : ''}" data-palette="${key}">
                        <div class="palette-icon-wrapper">
                            <span class="palette-icon">${key[0].toUpperCase()}</span>
                        </div>
                        <div class="palette-info">
                            <span class="palette-name">${palette.name}</span>
                        </div>
                    </button>
                `).join('');
            }

            function renderColors() {
                const colorSeries = document.getElementById('color-series');
                const paletteIntro = document.getElementById('paletteIntro');
                if (!colorSeries || !palettes) return;

                const palette = palettes[currentPalette];
                if (!palette) return;

                if (paletteIntro) {
                    paletteIntro.innerHTML = `<h3>${palette.name}</h3><p>${palette.info}</p>`;
                }

                let html = '';
                for (const [seriesKey, series] of Object.entries(palette.series)) {
                    const seriesColors = series.colors.map(color => `
                        <div class="color-card" data-hex="${color.hex}" data-name="${color.name}">
                            <div class="color-card-swatch" style="background-color: ${color.hex}">
                                <span class="color-card-name">${color.name}</span>
                            </div>
                            <div class="color-card-info">
                                <span class="color-card-hex">${color.hex}</span>
                            </div>
                        </div>
                    `).join('');

                    html += `
                        <div class="color-series-section" data-series="${seriesKey}">
                            <div class="color-series-header" style="border-left-color: ${series.color}">
                                <h4 class="color-series-title">${series.name}</h4>
                                <span class="color-series-count">${series.colors.length} colors</span>
                            </div>
                            <div class="color-grid">${seriesColors}</div>
                        </div>
                    `;
                }
                colorSeries.innerHTML = html;
            }

            function setupEventListeners() {
                const paletteList = document.getElementById('seriesNavList');
                if (paletteList) {
                    paletteList.addEventListener('click', (e) => {
                        const item = e.target.closest('.palette-item');
                        if (item) {
                            currentPalette = item.dataset.palette;
                            renderSidebarPalettes();
                            renderColors();
                        }
                    });
                }

                const colorSeries = document.getElementById('color-series');
                if (colorSeries) {
                    colorSeries.addEventListener('click', (e) => {
                        const card = e.target.closest('.color-card');
                        if (card) {
                            const hex = card.dataset.hex;
                            copyToClipboard(hex);
                            showToast('Copied: ' + hex);
                        }
                    });
                }

                const searchInput = document.getElementById('colorSearch');
                if (searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        const query = e.target.value.toLowerCase();
                        const searchClear = document.getElementById('searchClear');
                        if (searchClear) {
                            searchClear.style.display = query ? 'block' : 'none';
                        }
                        filterColors(query);
                    });
                }

                const searchClear = document.getElementById('searchClear');
                if (searchClear) {
                    searchClear.addEventListener('click', () => {
                        const searchInput = document.getElementById('colorSearch');
                        if (searchInput) {
                            searchInput.value = '';
                            searchClear.style.display = 'none';
                            filterColors('');
                        }
                    });
                }
            }

            function filterColors(query) {
                const colorSeries = document.getElementById('color-series');
                if (!colorSeries) return;

                const sections = colorSeries.querySelectorAll('.color-series-section');
                sections.forEach(section => {
                    const cards = section.querySelectorAll('.color-card');
                    let visibleCount = 0;
                    cards.forEach(card => {
                        const hex = card.dataset.hex.toLowerCase();
                        const name = card.dataset.name.toLowerCase();
                        const match = !query || hex.includes(query) || name.includes(query);
                        card.style.display = match ? '' : 'none';
                        if (match) visibleCount++;
                    });
                    section.style.display = visibleCount > 0 ? '' : 'none';
                });
            }

            function copyToClipboard(text) {
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(text);
                } else {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                }
            }

            function showToast(message) {
                const toast = document.getElementById('toast');
                if (toast) {
                    toast.textContent = message;
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 2000);
                }
            }

            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
    <script src="shared.js"></script>
