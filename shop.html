    <style>
        .shop-page .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }
        .shop-page .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .shop-page .page-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: var(--bg-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .shop-page .page-header p {
            color: var(--text-light);
            font-size: 1rem;
        }
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .shop-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        .shop-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .shop-card-image {
            height: 180px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
        }
        .shop-card-image img {
            transform: translateX(-30px);
        }
        .shop-card-image img {
            position: relative;
            z-index: 0;
        }
        .shop-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a9b);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .shop-coupon {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ff6b6b;
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .shop-card-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 0 0 16px 16px;
        }
        .shop-card-body h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.5;
            margin-bottom: 8px;
            flex: 1;
        }
        .shop-code-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fef6e7;
            border: 1px dashed #ff9f43;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }
        .shop-code-row:active {
            transform: scale(0.98);
            background: #fce9cc;
        }
        .shop-code-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: #e67e22;
            background: #fff;
            padding: 2px 8px;
            border-radius: 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .shop-code {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-dark);
            letter-spacing: 0.3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }
        .shop-code-copy-icon {
            flex-shrink: 0;
            font-size: 0.75rem;
            color: #e67e22;
            background: #fff;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .shop-code-row.copied .shop-code-copy-icon {
            background: #2ecc71;
            color: #fff;
        }
        .shop-code-row.copied .shop-code-label {
            background: #2ecc71;
            color: #fff;
        }
        .shop-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 99999;
            white-space: nowrap;
        }
        .shop-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .shop-btn {
            display: block;
            text-align: center;
            padding: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a9b);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .shop-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,107,107,0.35);
        }
        .shop-btn-hint {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.4;
        }
        .shop-footer {
            text-align: center;
            margin-top: 40px;
            color: var(--text-muted);
            font-size: 0.82rem;
            line-height: 1.8;
        }
        @media (max-width: 640px) {
            .shop-page .container { padding: 80px 14px 30px; }
            .shop-card-image { height: 150px; font-size: 3rem; }
            .shop-page .page-header h1 { font-size: 1.5rem; }
            .shop-grid { grid-template-columns: 1fr; }
            .shop-card-image { height: 150px; font-size: 3rem; }
            .shop-card-body { padding: 16px; }
            .shop-card-body h3 { font-size: 0.9rem; }
            .shop-code-row { padding: 8px 10px; }
            .shop-code { font-size: 0.78rem; }
            .shop-code-copy-icon { padding: 3px 8px; font-size: 0.7rem; }
        }
    </style>
</head>
<body class="shop-page">
    <div id="navbar-placeholder"></div>

    <div class="container">
        <div class="page-header fade-in">
            <h1>🛒 拼豆好物推荐</h1>
            <p>精选优质拼豆材料工具，淘宝好价直达</p>
        </div>

        <div class="shop-grid" id="shopGrid">
            <!-- 商品卡片由 JS 动态渲染 -->
        </div>

        <div class="shop-footer">
            <p>💡 以上链接为淘宝推广链接，价格仅供参考，实际以商品页为准</p>
            <p>本站不直接销售商品，仅提供购买参考</p>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <!-- 复制成功 Toast -->
    <div class="shop-toast" id="shopToast"></div>

    <script>
        const products = [
            {
                name: '265色拼豆补充包211色全套装全色系MARD同款融合材料diy益智玩具',
                badge: '',

                code: '59￥ CZ356 q6Dn5zZl5vs￥ https://m.tb.cn/h.RgqpiSi',
                image: 'images/shop-mard-265.jpg',

            },
            {

                badge: '',
                coupon: '',
                code: '28￥ CZ028 pA1S5zZpJAN￥ https://m.tb.cn/h.R6H8TS4',
                image: 'images/shop-bead-pen.jpg',
                url: 'https://s.click.taobao.com/Os02QMl'
            },
            {
                name: '长钉拼豆板特大号画线款10452加厚耐高温防烫不掉不变形专用白色',
                badge: '',
                coupon: '20元',
                code: '28￥ CZ225 xAjE5zZIUW7￥ https://m.tb.cn/h.RTO39gI',
                image: 'images/shop-pegboard.jpg',
                url: 'https://s.click.taobao.com/QB3NqCl'
            },
            {
                name: '十个勤天拼豆豆生日礼物女孩子儿童节玩具的女生小学生女孩子10岁',
                badge: '',
                coupon: '',
                code: '79￥ HU591 DoEj5zZsAER￥ https://m.tb.cn/h.RTOe9yA',
                image: 'images/shop-gift.jpg',
                url: 'https://s.click.taobao.com/J5ZaPMl'
            },
            {
                name: '拼豆熨烫布格利特布料闪光烘焙布熨烫工具粗闪亮片纸手工diy毛巾',
                badge: '',
                coupon: '1元',
                code: '68￥ HU287 HJfA5zZsun3￥ https://m.tb.cn/h.R6HNQaf',
                image: 'images/shop-iron-cloth.jpg',
                url: 'https://s.click.taobao.com/3lI9qCl'
            },
            {
                name: '拼豆豆手工diy材料包全套工具正版专用熨斗融合豆笔套装女孩玩具',
                badge: '',
                coupon: '8元',
                code: '17￥ CZ356 CVK25zZurhf￥ https://m.tb.cn/h.R5Ci4LZ',
                image: 'images/shop-tool-kit.jpg',
                url: 'https://s.click.taobao.com/bcI0qCl'
            }
        ];

        // 更多商品可在此添加 ↑

        function renderProducts() {
            const grid = document.getElementById('shopGrid');
            grid.innerHTML = products.map((p, i) => `
                <div class="shop-card fade-in">
                    <div class="shop-card-image">
                        ${p.badge ? `<span class="shop-badge">🔥 ${p.badge}</span>` : ''}
                        ${p.coupon ? `<span class="shop-coupon">券${p.coupon}</span>` : ''}
                        ${p.image.startsWith("images/") ? "<img src=\"" + p.image + "\" alt=\"" + p.name + "\" style=\"width:100%;height:100%;object-fit:contain;background:#fff\">" : p.image}
                    </div>
                    <div class="shop-card-body">
                        <h3>${p.name}</h3>
                        <div class="shop-code-row" data-code="${p.code}" data-index="${i}" role="button" tabindex="0" aria-label="复制淘口令">
                            <span class="shop-code-label">📋 淘口令</span>
                            <span class="shop-code" id="shopCode_${i}">${p.code}</span>
                            <span class="shop-code-copy-icon">复制</span>
                        </div>
                        <button class="shop-btn" data-url="${p.url}">打开淘宝</button>
                        <div class="shop-btn-hint">👆 复制口令后打开淘宝粘贴即可</div>
                    </div>
                </div>
            `).join('');
        }

        /** 复制淘口令到剪贴板 */
        function copyTaobaoCode(code, rowEl) {
            // 尝试 navigator.clipboard (优先)
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(code).then(function() {
                    showCopyFeedback(rowEl);
                }).catch(function() {
                    fallbackCopy(code, rowEl);
                });
            } else {
                fallbackCopy(code, rowEl);
            }
        }

        /** 兼容旧浏览器的复制方式 */
        function fallbackCopy(code, rowEl) {
            var ta = document.createElement('textarea');
            ta.value = code;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            ta.style.top = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            try {
                document.execCommand('copy');
                showCopyFeedback(rowEl);
            } catch (e) {
                // 复制失败，选中文本让用户手动复制
                ta.style.left = '10px';
                ta.style.top = '50%';
                ta.style.width = '80%';
                ta.style.height = '40px';
                ta.style.fontSize = '16px';
                ta.style.zIndex = '99999';
                setTimeout(function() {
                    document.body.removeChild(ta);
                }, 3000);
                return;
            }
            document.body.removeChild(ta);
        }

        /** 复制成功视觉反馈 */
        function showCopyFeedback(rowEl) {
            rowEl.classList.add('copied');
            var icon = rowEl.querySelector('.shop-code-copy-icon');
            var label = rowEl.querySelector('.shop-code-label');
            var oldText = icon.textContent;
            var oldLabel = label.textContent;
            icon.textContent = '✓ 已复制';
            label.textContent = '✅';

            // 显示全局 Toast
            var toast = document.getElementById('shopToast');
            if (toast) {
                toast.textContent = '✅ 已复制，打开淘宝即可粘贴查看';
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(function() { toast.classList.remove('show'); }, 2500);
            }

            // 2 秒后还原
            setTimeout(function() {
                rowEl.classList.remove('copied');
                icon.textContent = oldText;
                label.textContent = oldLabel;
            }, 2000);
        }

        document.addEventListener('DOMContentLoaded', renderProducts);

        /** 全局点击处理：复制口令 + 打开淘宝 */
        document.addEventListener('click', function(e) {
            // 点击口令行 → 复制
            var codeRow = e.target.closest('.shop-code-row');
            if (codeRow) {
                var code = codeRow.getAttribute('data-code');
                if (code) copyTaobaoCode(code, codeRow);
                return;
            }

            // 点击打开淘宝按钮
            var btn = e.target.closest('.shop-btn');
            if (btn) {
                var url = btn.getAttribute('data-url');
                if (!url) return;
                if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                    e.preventDefault();
                    window.location.href = url;
                } else {
                    window.open(url, '_blank');
                }
            }
        });
    </script>
    <script src="shared.js"></script>
</body>
</html>
