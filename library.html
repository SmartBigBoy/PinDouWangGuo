<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://pindou.skin/library.html">
    <link rel="shortcut icon" href="logo.svg" type="image/svg+xml">
    <meta property="og:type" content="website">
    <meta property="og:title" content="像素素材库">
    <meta property="og:description" content="免费像素艺术素材库，多款热门IP图案模板。">
    <meta property="og:url" content="https://pindou.skin/library.html">
    <link rel="stylesheet" href="style.css">

    <!-- 百度统计 -->

    <meta property="og:image:height" content="630">

</head>
<body class="library-page">
    <!-- 导航栏 (由 shared.js 注入) -->
    <div id="navbar-placeholder"></div>

    <div class="container">
        <div class="page-header fade-in">
            <h1>📚 拼豆素材库</h1>
            <p>精选优质拼豆素材，免费下载，禁止商用</p>
        </div>

        <div class="category-filter fade-in">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="stardew">星露谷物语</button>
            <button class="filter-btn" data-category="animal">动物萌宠</button>
            <button class="filter-btn" data-category="food">美食饮品</button>
            <button class="filter-btn" data-category="cartoon">动漫IP</button>
            <button class="filter-btn" data-category="other">其他</button>
        </div>

        <div class="library-grid" id="libraryGrid">
            <!-- Cards rendered by JavaScript -->
        </div>

        <div class="usage-section fade-in">
            <h2>📌 使用须知</h2>
            <div class="usage-grid">
                <div class="usage-card allowed">
                    <h3><span>✅</span> 允许的使用方式</h3>
                    <ul>
                        <li>个人手工制作拼豆作品</li>
                        <li>非商业用途的作品展示</li>
                        <li>学习和交流像素艺术</li>
                        <li>亲友间的礼物赠送</li>
                    </ul>
                </div>
                <div class="usage-card forbidden">
                    <h3><span>🚫</span> 禁止的使用方式</h3>
                    <ul>
                        <li>任何形式的商用售卖</li>
                        <li>二次打包后进行传播</li>
                        <li>用于NFT等数字藏品</li>
                        <li>侵犯原作品版权的行为</li>
                    </ul>
                </div>
                <div class="usage-card submit">
                    <h3><span>💡</span> 素材提交</h3>
                    <p>欢迎分享你的原创拼豆素材！将素材发送至我们的邮箱，审核通过后将展示在素材库中，并标注作者信息。</p>
                </div>
            </div>
        </div>
    </div>

    <div class="lightbox-overlay" id="lightboxOverlay" role="dialog" aria-modal="true" aria-label="图片预览" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()" tabindex="0" role="button" aria-label="关闭预览" onkeydown="if(event.key==='Enter'||event.key===' ')closeLightbox()">&times;</span>
        <img id="lightboxImage" class="lightbox-content" alt="预览大图" onclick="event.stopPropagation()">
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>

    <!-- 页脚 (由 shared.js 注入) -->
    <div id="footer-placeholder"></div>

    <script>
        // 素材数据
        const libraryData = [
            { title: '星露谷物语 - Bouncer', image: 'images/library/Bouncer.png', category: 'stardew', categoryLabel: '🌾 星露谷物语', previewClass: 'stardew-preview', size: '32×32', shape: '方形' },
            { title: '星露谷物语 - Gunther', image: 'images/library/Gunther.png', category: 'stardew', categoryLabel: '🌾 星露谷物语', previewClass: 'stardew-preview', size: '32×32', shape: '方形' },
            { title: '星露谷物语 - Caroline', image: 'images/library/Caroline.png', category: 'stardew', categoryLabel: '🌾 星露谷物语', previewClass: 'stardew-preview', size: '32×32', shape: '方形' },
            { title: '星露谷物语 - Gil', image: 'images/library/Gil.png', category: 'stardew', categoryLabel: '🌾 星露谷物语', previewClass: 'stardew-preview', size: '32×32', shape: '方形' },
            { title: '星露谷物语 - Grandpa', image: 'images/library/Grandpa.png', category: 'stardew', categoryLabel: '🌾 星露谷物语', previewClass: 'stardew-preview', size: '32×32', shape: '方形' },
            { title: '星露谷物语 - Krobus', image: 'images/library/Krobus.png', category: 'stardew', categoryLabel: '🌾 星露谷物语', previewClass: 'stardew-preview', size: '32×32', shape: '方形' },
            { title: '星露谷物语 - Marlon', image: 'images/library/Marlon.png', category: 'stardew', categoryLabel: '🌾 星露谷物语', previewClass: 'stardew-preview', size: '32×32', shape: '方形' },
            { title: '星露谷物语 - MrQi', image: 'images/library/MrQi.png', category: 'stardew', categoryLabel: '🌾 星露谷物语', previewClass: 'stardew-preview', size: '32×32', shape: '方形' },
            { title: '星露谷物语 - Penny', image: 'images/library/Penny.png', category: 'stardew', categoryLabel: '🌾 星露谷物语', previewClass: 'stardew-preview', size: '32×32', shape: '方形' },
            { title: '动漫IP - Hello Kitty', image: 'images/library/Hello Kitty.png', category: 'cartoon', categoryLabel: '🎭 动漫IP', previewClass: 'cartoon-preview', size: '32×32', shape: '方形' },
            { title: '其他 - 肌肉男', image: 'images/library/muscle_man_1.png', category: 'other', categoryLabel: '📦 其他', previewClass: 'other-preview', size: '58×58', shape: '方形' },
            { title: '其他 - Icon', image: 'images/library/Icon.png', category: 'other', categoryLabel: '📦 其他', previewClass: 'other-preview', size: '32×32', shape: '方形' },
            { title: '其他 - 快乐小狗', image: 'images/library/happy_puppy.png', category: 'other', categoryLabel: '📦 其他', previewClass: 'other-preview', size: '58×58', shape: '方形' },
            { title: '其他 - 美式肌肉男', image: 'images/library/american_muscle_man.png', category: 'other', categoryLabel: '📦 其他', previewClass: 'other-preview', size: '58×58', shape: '方形' }
        ];

        function renderLibraryCards(filter) {
            const grid = document.getElementById('libraryGrid');
            const filtered = filter === 'all'
                ? libraryData
                : libraryData.filter(item => item.category === filter);

            grid.innerHTML = filtered.map(item => {
                const filename = item.image.split('/').pop();
                const downloadFilename = filename.replace(/\s+/g, '_');
                return `
                <div class="library-card fade-in" data-category="${item.category}">
                    <div class="library-preview ${item.previewClass}" style="background: #f5f5f5; cursor: zoom-in;" onclick="openLightbox('${encodeURI(item.image)}', '${item.title}')">
                        <span class="library-badge">免费</span>
                        <img src="${item.image}" alt="${item.title}" loading="lazy">
                    </div>
                    <div class="library-info">
                        <h3 class="library-title">${item.title}</h3>
                        <div class="library-meta">
                            <span class="library-category">${item.categoryLabel}</span>
                            <span>1个素材</span>
                        </div>
                        <div class="library-stats">
                            <span>📐 ${item.size}</span>
                            <span>⬜ ${item.shape}</span>
                        </div>
                        <button class="download-btn" onclick="event.stopPropagation(); downloadImage('${encodeURI(item.image)}', '${downloadFilename}')">
                            📥 下载素材
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function filterCategory(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderLibraryCards(category);
        }

        function openLightbox(imageUrl, caption) {
            const lightbox = document.getElementById('lightboxOverlay');
            const lightboxImage = document.getElementById('lightboxImage');
            const lightboxCaption = document.getElementById('lightboxCaption');

            lightboxImage.src = imageUrl;
            lightboxCaption.textContent = caption;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightboxOverlay');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function downloadImage(url, filename) {
            fetch(url)
                .then(response => response.blob())
                .then(blob => {
                    const blobUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(blobUrl);
                })
                .catch(err => {
                    console.error('下载失败:', err);
                    window.open(url, '_blank');
                });
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            // 渲染素材卡片
            renderLibraryCards('all');

            // 分类筛选按钮
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    filterCategory(this.dataset.category, this);
                });
            });

            // 移动端导航菜单
            const navToggle = document.getElementById('navToggle');
            const navMenu = document.querySelector('.nav-menu');

            if (navToggle && navMenu) {
                navToggle.addEventListener('click', () => {
                    navMenu.classList.toggle('active');
                });
            }
        });
    </script>
    <script src="shared.js"></script>
</body>
</html>
