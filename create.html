<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼豆创作 - 手绘涂色 | 拼豆王国</title>
    <meta name="description" content="在空白网格上自由绘制拼豆图案，或上传图片后逐格修改颜色。">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://pindou.skin/create.html">
    <link rel="shortcut icon" href="logo.svg" type="image/svg+xml">
    <meta property="og:type" content="website">
    <meta property="og:title" content="拼豆创作 - 手绘涂色">
    <meta property="og:description" content="自由绘制拼豆图案，或上传图片逐格修改颜色。">
    <meta property="og:url" content="https://pindou.skin/create.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:image" content="https://pindou.skin/images/og-preview.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:image" content="https://pindou.skin/images/og-preview.png">
    <link rel="stylesheet" href="style.css">
    <div id="analytics-placeholder"></div>
    <style>
        .create-page .container {
            max-width: 100%;
            margin: 0;
            padding: 0;
        }

        /* ===== 顶层布局 ===== */
        .create-wrapper {
            display: flex;
            height: calc(100vh - 60px);
            margin-top: 60px;
        }

        /* ===== 左侧面板 ===== */
        .create-sidebar {
            width: 300px;
            min-width: 300px;
            background: #f8f9fc;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
        }

        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

        /* 工具按钮行 */
        .tool-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
        }
        .tool-bar .tool-btn {
            flex: 1;
            padding: 8px 4px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }
        .tool-bar .tool-btn:hover { border-color: var(--primary-color); }
        .tool-bar .tool-btn.active {
            background: var(--bg-gradient);
            border-color: var(--primary-color);
            color: white;
        }

        /* 设置行（网格+色卡） */
        .settings-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .settings-row select {
            flex: 1;
            min-width: 0;
            padding: 6px 8px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.8rem;
            background: white;
        }
        .settings-row select:focus { outline: none; border-color: var(--primary-color); }
        .settings-row input[type="number"] {
            width: 48px;
            padding: 6px 4px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.8rem;
            text-align: center;
        }

        /* 当前颜色显示 */
        .current-color-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: white;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 2px solid var(--border-color);
        }
        .current-color-swatch {
            width: 32px; height: 32px;
            border-radius: 6px;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            flex-shrink: 0;
        }
        .current-color-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-dark);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 色板 */
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            gap: 3px;
            margin-bottom: 12px;
        }
        .palette-grid .color-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.12s ease;
        }
        .palette-grid .color-cell:hover {
            transform: scale(1.25);
            z-index: 2;
            border-color: #333;
        }
        .palette-grid .color-cell.selected {
            border-color: #333;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #333;
        }

        /* 可折叠区域 */
        .collapse-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dark);
            user-select: none;
            border-top: 1px solid var(--border-color);
            margin-top: 6px;
        }
        .collapse-header:first-child { border-top: none; margin-top: 0; }
        .collapse-header::after {
            content: '▾';
            font-size: 0.7rem;
            transition: transform 0.2s;
        }
        .collapse-header.collapsed::after { transform: rotate(-90deg); }
        .collapse-body { overflow: hidden; transition: max-height 0.25s ease; max-height: 500px; }
        .collapse-body.collapsed { max-height: 0; }

        /* 导入区 */
        .import-area {
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            margin-bottom: 8px;
        }
        .import-area:hover { border-color: var(--primary-color); background: rgba(102,126,234,0.04); }
        .import-area.dragover { border-color: var(--secondary-color); transform: scale(1.02); }
        .import-area .icon { font-size: 1.8rem; margin-bottom: 4px; }
        .import-area .label { font-size: 0.85rem; font-weight: 600; }
        .import-area .hint { font-size: 0.75rem; color: var(--text-muted); }

        .import-slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
        }
        .import-slider-row input[type="range"] { flex: 1; }
        .import-slider-row span { font-size: 0.8rem; font-weight: 600; min-width: 30px; text-align: right; }

        /* 统计 */
        .stats-text { font-size: 0.82rem; color: var(--text-dark); line-height: 1.7; }
        .stats-text b { color: var(--primary-color); }
        .stats-color-list {
            max-height: 110px;
            overflow-y: auto;
            font-size: 0.78rem;
            margin-top: 6px;
        }
        .stats-color-list::-webkit-scrollbar { width: 3px; }
        .stats-color-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

        /* 按钮区域 */
        .action-row {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }
        .action-row .btn {
            flex: 1;
            padding: 8px 12px;
            font-size: 0.82rem;
            justify-content: center;
        }

        /* ===== 右侧画布区 ===== */
        .create-canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f1f5;
            overflow: auto;
            padding: 20px;
            position: relative;
        }
        .create-canvas-area canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            cursor: crosshair;
            background: white;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .canvas-tip {
            color: var(--text-muted);
            font-size: 1rem;
            text-align: center;
        }
        .canvas-tip span { font-size: 3rem; display: block; margin-bottom: 10px; }

        /* ===== 响应式: 平板 ===== */
        @media (max-width: 1024px) {
            .create-wrapper {
                flex-direction: column;
                height: auto;
                min-height: calc(100vh - 60px);
            }
            .create-sidebar {
                width: 100%;
                min-width: 0;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                max-height: 45vh;
            }
            .sidebar-scroll {
                padding: 10px 14px;
            }
            .palette-grid {
                grid-template-columns: repeat(auto-fill, minmax(34px, 1fr));
                max-height: 140px;
            }
            .create-canvas-area {
                min-height: 50vh;
                padding: 12px;
            }
        }

        /* ===== 响应式: 手机 ===== */
        @media (max-width: 640px) {
            .collapse-body.collapsed-mobile { max-height: 0; }
            .collapse-header.collapsed-mobile::after { transform: rotate(-90deg); }
            .create-wrapper { margin-top: 50px; min-height: calc(100vh - 50px); }
            .create-sidebar { max-height: 40vh; }
            .sidebar-scroll { padding: 8px 10px; }
            .tool-bar .tool-btn { font-size: 0.72rem; padding: 6px 2px; }
            .palette-grid {
                grid-template-columns: repeat(auto-fill, minmax(28px, 1fr));
                gap: 2px;
                max-height: 100px;
            }
            .create-canvas-area { min-height: 55vh; padding: 8px; }
            .current-color-bar { padding: 6px 10px; }
            .current-color-swatch { width: 26px; height: 26px; }
        }
    </style>
</head>
<body class="create-page">
    <div id="navbar-placeholder"></div>

    <div class="create-wrapper">
        <!-- 左侧面板 -->
        <div class="create-sidebar">
            <div class="sidebar-scroll">

                <!-- 工具行 -->
                <div class="tool-bar">
                    <button class="tool-btn active" data-tool="paint" id="paintTool">✏️ 涂色</button>
                    <button class="tool-btn" data-tool="eraser" id="eraserTool">🧹 擦除</button>
                    <button class="tool-btn" data-tool="fill" id="fillTool">🪣 填充</button>
                </div>

                <!-- 设置 -->
                <div class="settings-row">
                    <select id="editorGridSize">
                        <option value="15x15">15×15</option>
                        <option value="20x20">20×20</option>
                        <option value="29x29" selected>29×29</option>
                        <option value="39x39">39×39</option>
                        <option value="58x58">58×58</option>
                        <option value="104x104">104×104</option>
                        <option value="custom">自定义</option>
                    </select>
                    <select id="editorPalette">
                        <option value="mard291">MARD</option>
                        <option value="mard221">MARD 221</option>
                        <option value="artkal">Artkal</option>
                        <option value="perler">Perler</option>
                        <option value="hama">Hama</option>
                    </select>
                </div>
                <div class="settings-row" id="editorCustomGrid" style="display:none">
                    <input type="number" id="editorGridW" min="5" max="200" value="20"> ×
                    <input type="number" id="editorGridH" min="5" max="200" value="20">
                    <span style="font-size:0.75rem;color:var(--text-muted)">(5-200)</span>
                </div>
                <div class="settings-row">
                    <select id="editorBeadSize">
                        <option value="5">5mm 标准</option>
                        <option value="2.6">2.6mm Mini</option>
                        <option value="8">8mm 大颗粒</option>
                    </select>
                    <span id="editorPhysicalSize" style="font-size:0.75rem;color:var(--text-muted);line-height:32px">—</span>
                </div>

                <!-- 当前颜色 -->
                <div class="current-color-bar">
                    <div class="current-color-swatch" id="currentColorSwatch" style="background:#e0e0e0"></div>
                    <span class="current-color-name" id="currentColorName">选择颜色</span>
                </div>

                <!-- 色板 -->
                <div class="palette-grid" id="editorPaletteGrid"></div>

                <!-- 导入图片（可折叠） -->
                <div class="collapse-header" id="importHeader">📥 导入图片</div>
                <div class="collapse-body" id="importBody">
                    <div class="import-area" id="editorUploadArea">
                        <input type="file" id="editorImageInput" accept="image/*" style="display:none">
                        <div class="icon">📷</div>
                        <div class="label">上传图片</div>
                        <div class="hint">转为拼豆后逐格修改</div>
                    </div>
                    <div class="import-slider-row">
                        <span style="font-size:0.8rem">颜色</span>
                        <input type="range" id="editorImportColors" min="2" max="291" value="48">
                        <span id="editorImportColorVal">16</span>
                    </div>
                    <button class="btn btn-primary" id="editorImportBtn" style="width:100%;font-size:0.82rem" disabled>⬆️ 导入并像素化</button>
                </div>

                <!-- 统计信息（可折叠） -->
                <div class="collapse-header" id="statsHeader">📊 统计</div>
                <div class="collapse-body" id="statsBody">
                    <div class="stats-text" id="editorStats">
                        <p style="color:var(--text-muted)">暂无数据</p>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="action-row">
                    <button class="btn btn-primary" id="editorDownloadBtn">📥 下载</button>
                    <button class="btn btn-secondary" id="editorClearBtn">🗑️ 清空</button>
                </div>

            </div>
        </div>

        <!-- 右侧画布 -->
        <div class="create-canvas-area" id="editorCanvasArea">
            <canvas id="editorCanvas"></canvas>
            <div class="canvas-tip" id="canvasTip" style="display:none">
                <span>🖌️</span>
                <p>选择颜色后点击格子开始涂色</p>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="colors.js"></script>
    <script src="create.js"></script>
    <script src="shared.js"></script>
</body>
</html>
