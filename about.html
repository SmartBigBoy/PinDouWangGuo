<body class="about-page">
    <!-- 导航栏 (由 shared.js 注入) -->

    <div class="container">
        <div class="timeline-container fade-in">
            <div class="timeline-title">
                <h1>📜 拼豆发展历史时间轴</h1>
                <p>从瑞典养老院的康复器材，到中国年轻人的解压新宠</p>
            </div>

            <div class="timeline" id="timeline">
            </div>
        </div>

        <div class="reasons-section fade-in">
            <h2>🌟 为什么拼豆在中国爆火？</h2>
            <div class="reasons-grid">
                <div class="reason-item">
                    <div class="reason-icon">😌</div>
                    <h3>治愈解压</h3>
                    <p>简单重复的动作让大脑放空，在创作中获得情绪释放</p>
                </div>
                <div class="reason-item">
                    <div class="reason-icon">🎁</div>
                    <h3>低门槛易上手</h3>
                    <p>无需专业技能，照着图纸就能做出精美的作品</p>
                </div>
                <div class="reason-item">
                    <div class="reason-icon">👫</div>
                    <h3>社交货币</h3>
                    <p>成品可做挂件、摆件，社交平台分享成为新潮流</p>
                </div>
                <div class="reason-item">
                    <div class="reason-icon">📺</div>
                    <h3>明星效应</h3>
                    <p>热播剧主演推荐，带动了拼豆的全民热潮</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 (由 shared.js 注入) -->
    <div id="footer-placeholder"></div>

    <script>
        const timelineData = [
            { year: '1971', title: '拼豆诞生', description: '瑞典工程师古纳尔·克努特森以「纳比珠」为名申请专利，最初作为养老院的康复器材。', image: '💡' },
            { year: '1980年代', title: '进入儿童玩具市场', description: '美国玩具公司Perler将拼豆引入北美市场，改造为儿童益智玩具。英文名「Perler Beads」由此而来。', image: '🧸' },
            { year: '2024年', title: '永夜星河引爆热度', description: '热播剧《永夜星河》主创人员在宣传活动中提及拼豆，带动同款图案材料包搜索量同比增长超20倍。', image: '⭐' },
            { year: '2025年', title: '市场爆发增长', description: '全年销售额突破亿元大关，入选淘宝「年度十大商品」，搜索量同比激增近500%。', image: '📈' }
        ];

        function renderTimeline(data) {
            const container = document.getElementById('timeline');
            container.innerHTML = data.map((item, index) => `
                <div class="timeline-item fade-in" style="animation-delay: ${index * 0.1}s">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div class="timeline-icon">${item.image}</div>
                        <span class="timeline-year">${item.year}</span>
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTimeline(timelineData);

            const navToggle = document.getElementById('navToggle');
            const navMenu = document.querySelector('.nav-menu');

            if (navToggle && navMenu) {
                navToggle.addEventListener('click', () => {
                    navMenu.classList.toggle('active');
                });
            }
        });
    </script>
    <script src="shared.js"></script>
